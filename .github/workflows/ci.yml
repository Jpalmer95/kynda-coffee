name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx vitest run --reporter=verbose
        env:
          NEXT_PUBLIC_APP_URL: https://kyndacoffee.com
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-key

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    env:
      NEXT_PUBLIC_APP_URL: https://kyndacoffee.com
      NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-key
      SUPABASE_SERVICE_ROLE_KEY: test-key
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      FAL_KEY: dummy
      RESEND_API_KEY: re_dummy
      PRINTFUL_API_KEY: dummy
      SQUARE_ACCESS_TOKEN: dummy
      SQUARE_APPLICATION_ID: dummy
      SQUARE_LOCATION_ID: dummy
      SQUARE_WEBHOOK_SIGNATURE_KEY: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
